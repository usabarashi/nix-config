# See: https://developers.openai.com/codex/config-reference

# Model
model = "gpt-5.5"
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"
model_verbosity = "medium"

# Execution
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
notify = ["bash", "-lc", "afplay /System/Library/Sounds/Ping.aiff"]
personality = "pragmatic"
project_doc_fallback_filenames = ["CLAUDE.md", "GEMINI.md"]

# Features
[features]
memories = true

# Telemetry: disable anonymous usage/health metrics sent to OpenAI (on by default since v0.128.0)
[analytics]
enabled = false

# Session history
[history]
persistence = "save-all"
max_bytes = 10_485_760

# Workspace-write sandbox options
[sandbox_workspace_write]
network_access = true

# MCP servers
[mcp_servers.voicevox]
type = "stdio"
command = "voicevox-mcp-server"
args = []
startup_timeout_sec = 20
tool_timeout_sec = 120

# chrome-devtools-mcp drives Google Chrome via puppeteer-core; on PATH via
# modules/shared/agents-common.nix. Flags (non-obvious reasons only):
# - --isolated: ephemeral profile, never attaches to the real logged-in Chrome.
# - --headless: avoids the singleton crash when the user's Chrome is running.
# - --no-usage-statistics / --no-performance-crux: opt out of Google telemetry.
[mcp_servers.chrome-devtools]
type = "stdio"
command = "chrome-devtools-mcp"
args = ["--isolated", "--headless", "--channel=stable", "--no-usage-statistics", "--no-performance-crux"]
startup_timeout_sec = 30
tool_timeout_sec = 120
