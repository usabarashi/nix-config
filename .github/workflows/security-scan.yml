name: "Security Scan"

on:
  push:
    branches: [ "main" ]
    paths:
      - "**/*.nix"
      - "flake.lock"
      - ".github/workflows/security-scan.yml"
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: macos-latest
    timeout-minutes: 120
    strategy:
      matrix:
        config_name: [private, work]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install Nix
      uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      with:
        extra_nix_config: |
          connect-timeout = 60
          stalled-download-timeout = 90

    - name: Wait for Nix daemon
      run: |
        for i in $(seq 1 30); do
          nix store ping 2>/dev/null && exit 0
          sleep 1
        done
        echo "::error::Nix daemon did not become ready within 30 seconds"
        exit 1

    - name: Build darwinConfigurations.${{ matrix.config_name }}.system
      run: |
        export CURRENT_USER=$(whoami)
        export REPOSITORY_PATH=$(pwd)
        nix build .#darwinConfigurations.${{ matrix.config_name }}.system --impure

    - name: Generate SBOM
      run: |
        nix run nixpkgs#sbomnix -- result \
          --cdx sbom.cdx.json \
          --spdx sbom.spdx.json \
          --csv sbom.csv

    - name: Grype scan
      id: grype
      run: |
        nix run nixpkgs#grype -- sbom:sbom.cdx.json \
          -o table=grype-report.txt \
          -o sarif=grype-results.sarif
        vuln_count=$(nix run nixpkgs#jq -- '[.runs[].results[]] | length' grype-results.sarif)
        echo "vuln_count=${vuln_count}" >> "$GITHUB_OUTPUT"

    - name: Fix SARIF locations for Code Scanning
      run: |
        nix run nixpkgs#jq -- '
          (.runs[]?.results[]?) |= (
            ((.locations // []) | if length == 0 then [{}] else . end) as $locs |
            .locations = [$locs[] |
              if (.physicalLocation.artifactLocation.uri // "") != "" then .
              else
                ( .physicalLocation |= (. // {})
                | .physicalLocation.artifactLocation.uri |= (if . == "" or . == null then "flake.lock" else . end)
                | .physicalLocation.region |= (. // {})
                | .physicalLocation.region.startLine |= (. // 1)
                )
              end
            ]
          )
        ' grype-results.sarif > grype-results-fixed.sarif
        mv grype-results-fixed.sarif grype-results.sarif

    - name: Add scan summary
      run: |
        if [ "${{ steps.grype.outputs.vuln_count }}" = "0" ]; then
          echo "## Grype: no CVEs detected" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "## Grype: ${{ steps.grype.outputs.vuln_count }} CVEs detected" >> "$GITHUB_STEP_SUMMARY"
          printf '```\n' >> "$GITHUB_STEP_SUMMARY"
          cat grype-report.txt >> "$GITHUB_STEP_SUMMARY"
          printf '```\n' >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload SARIF to Code Scanning
      uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      with:
        sarif_file: grype-results.sarif
        category: ${{ matrix.config_name }}

    - name: Upload artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: security-scan-${{ matrix.config_name }}-${{ github.sha }}
        path: |
          sbom.cdx.json
          sbom.spdx.json
          sbom.csv
          grype-results.sarif
          grype-report.txt
        retention-days: 90
